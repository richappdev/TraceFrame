# Historical App Hosting config (antiable-traceframe backend retired 2026-07-19).
# Production is Firebase Hosting → Cloud Run `anipin-web` on project antiable-anipin.
# Canonical OAuth host: https://antiable-anipin.web.app
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 4
  concurrency: 40

# Standalone Next.js server.
# Monorepo tracing emits apps/web/server.js; isolated app emits server.js at standalone root.
scripts:
  runCommand: node .next/standalone/apps/web/start-production.mjs

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: HOSTNAME
    value: "0.0.0.0"
    availability:
      - RUNTIME
  - variable: DATA_DIR
    value: /tmp/antiable
    availability:
      - RUNTIME
  - variable: APP_STORE
    value: firestore
    availability:
      - RUNTIME
  - variable: BANGUMI_CLIENT_ID
    secret: BANGUMI_CLIENT_ID
    availability:
      - RUNTIME
  - variable: BANGUMI_CLIENT_SECRET
    secret: BANGUMI_CLIENT_SECRET
    availability:
      - RUNTIME
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
    availability:
      - RUNTIME
  - variable: BANGUMI_REDIRECT_URI
    secret: BANGUMI_REDIRECT_URI
    availability:
      - RUNTIME
  - variable: PRESENCE_DRAIN_SECRET
    secret: PRESENCE_DRAIN_SECRET
    availability:
      - RUNTIME
